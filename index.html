<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <h1 class="text-2xl font-bold mb-6">Job Application Tracker</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white p-6 shadow rounded"><h3>Total</h3><p id="total" class="text-xl font-bold">8</p></div>
        <div class="bg-white p-6 shadow rounded"><h3>Interview</h3><p id="interview-count" class="text-xl font-bold text-green-600">0</p></div>
        <div class="bg-white p-6 shadow rounded"><h3>Rejected</h3><p id="rejected-count" class="text-xl font-bold text-red-600">0</p></div>
    </div>

    <div class="flex gap-4 mb-6">
        <button onclick="renderJobs('All')" class="bg-blue-600 text-white px-4 py-2 rounded">All</button>
        <button onclick="renderJobs('Interview')" class="bg-gray-300 px-4 py-2 rounded">Interview</button>
        <button onclick="renderJobs('Rejected')" class="bg-gray-300 px-4 py-2 rounded">Rejected</button>
    </div>

    <div id="jobs-container" class="space-y-4"></div>

    <script src="app.js"></script>
</body>
</html>
